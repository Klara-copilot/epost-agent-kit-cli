name: Test Installation Scripts

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - 'README.md'
      - 'install/**'
      - 'package.json'
      - 'src/**'
      - '.github/workflows/test-install.yml'
  pull_request:
    branches:
      - main
      - master
      - develop
    paths:
      - 'README.md'
      - 'install/**'
      - 'package.json'
      - 'src/**'
      - '.github/workflows/test-install.yml'
  workflow_dispatch:

jobs:
  test-unix-install:
    name: Test Unix Installation (Bash)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [18, 20]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run installation script
        run: bash install/install.sh

      - name: Verify CLI is installed
        run: |
          which epost-kit
          epost-kit --version

      - name: Test CLI commands
        run: |
          epost-kit --help
          epost-kit doctor || true

      - name: Run basic smoke test
        run: |
          mkdir -p /tmp/epost-test
          cd /tmp/epost-test
          epost-kit init --dry-run || echo "Dry run completed"

  test-windows-powershell:
    name: Test Windows Installation (PowerShell)
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run PowerShell installation script
        run: |
          powershell -ExecutionPolicy Bypass -File install/install.ps1

      - name: Verify CLI is installed
        run: |
          where.exe epost-kit
          epost-kit --version
        shell: pwsh

      - name: Test CLI commands
        run: |
          epost-kit --help
          epost-kit doctor
        shell: pwsh
        continue-on-error: true

      - name: Run basic smoke test
        run: |
          mkdir $env:TEMP\epost-test -Force
          cd $env:TEMP\epost-test
          epost-kit init --dry-run
        shell: pwsh
        continue-on-error: true

  test-windows-cmd:
    name: Test Windows Installation (CMD)
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run CMD installation script
        # install.cmd is a standalone downloader — not testable from checkout.
        # Run install.ps1 directly (same underlying flow install.cmd invokes).
        run: powershell -NoLogo -NoProfile -ExecutionPolicy Bypass -File install/install.ps1

      - name: Verify CLI is installed
        run: |
          where epost-kit
          epost-kit --version
        shell: cmd

      - name: Test CLI commands
        run: |
          epost-kit --help
          epost-kit doctor
        shell: cmd
        continue-on-error: true

      - name: Run basic smoke test
        run: |
          mkdir %TEMP%\epost-test
          cd %TEMP%\epost-test
          epost-kit init --dry-run
        shell: cmd
        continue-on-error: true

  verify-documentation:
    name: Verify Installation Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check README.md has installation section
        run: |
          if ! grep -q "## Installation" README.md; then
            echo "ERROR: README.md missing Installation section"
            exit 1
          fi
          echo "✓ README.md has Installation section"

      - name: Check install/README.md exists
        run: |
          if [ ! -f "install/README.md" ]; then
            echo "ERROR: install/README.md not found"
            exit 1
          fi
          echo "✓ install/README.md exists"

      - name: Verify install scripts exist
        run: |
          scripts=("install.sh" "install.ps1" "install.cmd")
          for script in "${scripts[@]}"; do
            if [ ! -f "install/$script" ]; then
              echo "ERROR: install/$script not found"
              exit 1
            fi
            echo "✓ install/$script exists"
          done

      - name: Check install scripts are executable
        run: |
          if [ ! -x "install/install.sh" ]; then
            echo "ERROR: install.sh is not executable"
            exit 1
          fi
          echo "✓ install.sh is executable"

      - name: Check PS1 scripts are pure ASCII
        run: |
          if grep -rP '[\x80-\xFF]' install/*.ps1; then
            echo "ERROR: Non-ASCII bytes found in PS1 scripts - use ASCII only"
            exit 1
          fi
          echo "PS1 scripts are pure ASCII"

      - name: Validate installation one-liners in README
        run: |
          RAW_BASE="https://raw.githubusercontent.com/Klara-copilot/epost-agent-kit-cli/master/install"

          # Check curl one-liner for macOS/Linux
          if ! grep -q "curl -fsSL ${RAW_BASE}/install.sh" README.md; then
            echo "ERROR: README.md missing curl one-liner for macOS/Linux"
            exit 1
          fi
          echo "macOS/Linux one-liner OK"

          # Check irm one-liner for Windows PS
          if ! grep -q "irm ${RAW_BASE}/install.ps1" README.md; then
            echo "ERROR: README.md missing irm one-liner for Windows PS"
            exit 1
          fi
          echo "Windows PowerShell one-liner OK"

          # Ensure no old gh api one-liners remain
          if grep -q "gh api repos/Klara-copilot/epost-agent-kit-cli/contents/install" README.md; then
            echo "ERROR: README.md still contains old gh api one-liner"
            exit 1
          fi
          echo "No stale gh api one-liners found"

          # Same checks for install/README.md
          if ! grep -q "curl -fsSL ${RAW_BASE}/install.sh" install/README.md; then
            echo "ERROR: install/README.md missing curl one-liner for macOS/Linux"
            exit 1
          fi

          if ! grep -q "irm ${RAW_BASE}/install.ps1" install/README.md; then
            echo "ERROR: install/README.md missing irm one-liner for Windows PS"
            exit 1
          fi

          if grep -q "gh api repos/Klara-copilot/epost-agent-kit-cli/contents/install" install/README.md; then
            echo "ERROR: install/README.md still contains old gh api one-liner"
            exit 1
          fi
          echo "install/README.md one-liners OK"

  verify-url-accessible:
    name: Verify Raw GitHub URLs Are Publicly Accessible
    runs-on: ubuntu-latest

    steps:
      - name: Check raw install URLs are publicly accessible
        run: |
          RAW_BASE="https://raw.githubusercontent.com/Klara-copilot/epost-agent-kit-cli/master/install"
          for url in "${RAW_BASE}/install.sh" "${RAW_BASE}/install.ps1" "${RAW_BASE}/install.cmd"; do
            status=$(curl -o /dev/null -s -w "%{http_code}" "$url")
            if [ "$status" != "200" ]; then
              echo "ERROR: $url returned HTTP $status (expected 200)"
              exit 1
            fi
            echo "OK: $url ($status)"
          done

  test-npm-pack-unix:
    name: Test npm Pack Install (Unix)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [20, 22]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack
        run: npm pack

      - name: Install from tarball
        run: npm install -g ./aavn-epost-kit-*.tgz

      - name: Verify CLI is installed
        run: |
          which epost-kit
          epost-kit --version

      - name: Test CLI commands
        run: |
          epost-kit --help
          epost-kit doctor || true

      - name: Smoke test
        run: |
          mkdir -p /tmp/epost-npm-test
          cd /tmp/epost-npm-test
          epost-kit install || echo "Install completed"

  test-npm-pack-windows:
    name: Test npm Pack Install (Windows)
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack
        id: pack
        run: |
          $pkg = npm pack --json | ConvertFrom-Json
          echo "TARBALL=$($pkg[0].filename)" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Install from tarball
        run: npm install -g $env:TARBALL
        shell: pwsh

      - name: Verify CLI is installed
        run: |
          where.exe epost-kit
          epost-kit --version
        shell: pwsh

      - name: Test CLI commands
        run: |
          epost-kit --help
          epost-kit doctor
        shell: pwsh
        continue-on-error: true

      - name: Smoke test
        run: |
          mkdir $env:TEMP\epost-npm-test -Force
          cd $env:TEMP\epost-npm-test
          epost-kit install
        shell: pwsh
        continue-on-error: true

  report-results:
    name: Report Test Results
    needs: [test-unix-install, test-windows-powershell, test-windows-cmd, verify-documentation, verify-url-accessible, test-npm-pack-unix, test-npm-pack-windows]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Report Status
        run: |
          echo "## Installation Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unix (Bash) | ${{ needs.test-unix-install.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows (PowerShell) | ${{ needs.test-windows-powershell.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows (CMD) | ${{ needs.test-windows-cmd.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ needs.verify-documentation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| URL Accessibility | ${{ needs.verify-url-accessible.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| npm Pack Unix | ${{ needs.test-npm-pack-unix.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| npm Pack Windows | ${{ needs.test-npm-pack-windows.result }} |" >> $GITHUB_STEP_SUMMARY
